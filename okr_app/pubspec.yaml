name: okr_app
description: "OKR System mobile app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Network
  dio: ^5.7.0
  # Local storage
  flutter_secure_storage: ^9.2.3
  shared_preferences: ^2.3.4
  # Navigation
  go_router: ^14.8.0
  # UI
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  # Utils
  intl: ^0.19.0
  json_annotation: ^4.9.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
